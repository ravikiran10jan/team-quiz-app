services:
  app:
    build: .
    restart: always
    expose:
      - "3002"
    environment:
      - ADMIN_PASSWORD=quiz@123
    volumes:
      - quiz-data:/app/data

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  quiz-data:
